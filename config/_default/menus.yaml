# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: About
    url: /
    weight: 10
  - name: Team
    url: /#team
    weight: 11
  - name: News
    url: /blog
    weight: 12
  - name: Activities
    url: /#activities
    weight: 13
  - name: Papers
    url: papers/
    weight: 20
  - name: Contact
    url: contact/
    weight: 30
